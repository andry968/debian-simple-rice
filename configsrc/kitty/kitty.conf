#DEFAULT LOCATIAN USUALLY IN /home/your-username/.config/kitty/

# ======================
# HIDE TITTLE
# ======================
hide_window_decorations yes

# ======================
# FONT
# ======================
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
font_size        12.0

# ======================
# CURSOR
# ======================
cursor_shape block
cursor_blink_interval 0.5

# White block cursor
cursor #ffffff

# Black text when cursor is over it
cursor_text_color #000000

# ======================
# BACKGROUND & TRANSPARENCY
# ======================
background_opacity 0.4
dynamic_background_opacity yes

# ======================
# COLORS (Cyan/Black Theme)
# ======================
foreground #ccffff
background #000000

# Selection – white background, black text
selection_foreground #000000
selection_background #ffffff

# Black
color0 #0a0a0a
color8 #4c4c4c

# Red
color1 #ff6c6c
color9 #ff9e9e

# Green
color2 #8cff8c
color10 #b3ffb3

# Yellow
color3 #ffff8c
color11 #ffffb3

# Blue
color4 #6ccbff
color12 #9edcff

# Magenta
color5 #ff8cff
color13 #ffb3ff

# Cyan (primary accent)
color6 #00ffff
color14 #80ffff

# White
color7 #e6e6e6
color15 #ffffff

# ======================
# WINDOW
# ======================
window_padding_width 10
confirm_os_window_close 0

# ======================
# SCROLL & MOUSE
# ======================
scrollback_lines 10000
mouse_hide_wait 2.0
wheel_scroll_multiplier 5.0

# Scroll indicator (draggable icon on the right edge)
scrollback_indicator_opacity 1.0

# ======================
# PERFORMANCE
# ======================
enable_audio_bell no
